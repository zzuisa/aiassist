# AI Assist RabbitMQ tuning for a single-host personal deployment.
# The management plugin listens on loopback only and is never published to the
# host by compose; use an SSH tunnel for debugging.
management.tcp.ip = 127.0.0.1

# Quorum queues rely on publisher confirms and manual acks (configured by the
# Celery app). Keep memory conservative for a small server.
vm_memory_high_watermark.relative = 0.6
