# Compose-internal gateway. The host Nginx terminates TLS and proxies to
# 127.0.0.1:18080 (see deployment.md). This server block routes to the frontend
# static container and the backend API, and serves authorized private assets via
# an internal X-Accel-Redirect location.

upstream aiassist_backend {
    server backend:8000;
}
upstream aiassist_frontend {
    server frontend:80;
}

# Preserve the original HTTPS scheme supplied by the host TLS terminator while
# still working for direct localhost access during smoke tests.
map $http_x_forwarded_proto $aiassist_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;

    # Security headers (defense in depth behind the host TLS terminator).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ---- Server-Sent Events: buffering MUST be off ----
    location = /api/v1/events/jobs {
        proxy_pass http://aiassist_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $aiassist_forwarded_proto;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        add_header X-Accel-Buffering no;
    }

    # ---- API and health ----
    location /api/ {
        proxy_pass http://aiassist_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $aiassist_forwarded_proto;
        proxy_read_timeout 120s;
    }
    location /health/ {
        proxy_pass http://aiassist_backend;
        proxy_set_header Host $host;
    }

    # ---- Protected assets: only the backend may hand out this redirect ----
    # The backend authorizes ownership, then returns X-Accel-Redirect to
    # /_protected/<storage_key>. Browsers cannot reach it directly.
    location /_protected/ {
        internal;
        alias /data/assets/;
    }

    # ---- Static SPA with history fallback ----
    location / {
        proxy_pass http://aiassist_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $aiassist_forwarded_proto;
    }
}
