server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets; never cache the app shell or service worker.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Vue Router history mode: fall back to the SPA shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
