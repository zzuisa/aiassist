name: CI

on:
  push:
    branches: [master, "001-personal-life-os", "002-implement-personal-life-os"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check app tests
      - name: Format check
        run: ruff format --check app tests
      - name: Mypy
        run: mypy
      - name: Contract validation
        run: pytest -m contract -q
      - name: Unit tests
        run: pytest -m unit -q
      - name: git diff --check
        run: git diff --check

  backend-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: aiassist_test
          POSTGRES_USER: aiassist
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U aiassist" --health-interval 10s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:8.8.0
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 10
      rabbitmq:
        image: rabbitmq:4.3.2-management
        env:
          RABBITMQ_DEFAULT_USER: aiassist
          RABBITMQ_DEFAULT_PASS: testpass
          RABBITMQ_DEFAULT_VHOST: aiassist
        ports: ["5672:5672"]
        options: >-
          --health-cmd "rabbitmq-diagnostics -q check_running"
          --health-interval 15s --health-timeout 10s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://aiassist:testpass@localhost:5432/aiassist_test
      REDIS_URL: redis://localhost:6379/0
      AMQP_URL: amqp://aiassist:testpass@localhost:5672/aiassist
      JWT_SIGNING_KEY: ci-test-signing-key-not-a-secret-value-000000
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Migrations + integration
        run: pytest -m "integration" -q
      - name: Broker reliability tests
        run: pytest -m "broker" -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit/component tests
        run: npm test
      - name: Production build
        run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose
        run: |
          cp .env.example .env
          for s in postgres_password jwt_signing_key rabbitmq_password smtp_password llm_provider_key s3_access_key s3_secret_key; do
            printf 'placeholder' > "deploy/secrets/$s"
          done
          RABBITMQ_DEFAULT_PASS=placeholder docker compose --profile s3 --profile tools config --quiet
